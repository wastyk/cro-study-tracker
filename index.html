<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRO Study Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; }
  .container { max-width: 100%; margin: 0 auto; padding: 24px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header h1 { font-size: 30px; font-weight: 700; color: #111827; }
  .sync-info { font-size: 13px; color: #9ca3af; }

  /* Filters */
  .filters { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
  .filters .label { font-size: 14px; font-weight: 500; color: #4b5563; }
  .filter-btn { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 9999px; border: 1px solid #d1d5db; background: #fff; color: #6b7280; font-size: 14px; cursor: pointer; transition: all .15s; }
  .filter-btn.active { border-color: transparent; background: #1f2937; color: #fff; }
  .filter-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-partex { background: #3b82f6; }
  .dot-eurofins { background: #10b981; }
  .dot-nomic { background: #8b5cf6; }

  /* Study card */
  .study-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 40px; overflow: hidden; overflow-x: auto; }
  .study-header { padding: 20px 24px; border-bottom: 1px solid #f3f4f6; }
  .study-header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .study-title { font-size: 24px; font-weight: 700; color: #111827; }
  .study-sub { font-size: 16px; color: #6b7280; margin-top: 4px; }
  .study-stats { display: flex; gap: 32px; }
  .stat { text-align: center; }
  .stat-val { font-size: 30px; font-weight: 700; color: #111827; }
  .stat-label { font-size: 14px; color: #9ca3af; }

  /* Legend */
  .legend { display: flex; align-items: center; gap: 20px; margin-top: 16px; font-size: 14px; color: #9ca3af; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-weekend { display: inline-block; width: 24px; height: 12px; border-radius: 3px; background: repeating-linear-gradient(90deg, #e5e7eb 0px, #e5e7eb 4px, #f9fafb 4px, #f9fafb 8px); }
  .legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #6b7280; }
  .legend-rerun { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #6b7280; background: #fff; }
  .legend-recomm { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #fb923c; }
  .legend-today { display: inline-block; width: 24px; height: 2px; background: #f87171; }

  /* Chart area */
  .chart-area { padding: 16px; }

  /* Date axis */
  .date-axis { position: relative; height: 24px; margin-bottom: 8px; }
  .date-label { position: absolute; transform: translateX(-50%); font-size: 12px; color: #9ca3af; white-space: nowrap; }

  /* CRO group */
  .cro-group { display: flex; margin-bottom: 12px; }
  .cro-label-col { position: relative; flex-shrink: 0; width: 40px; border-radius: 8px 0 0 8px; border-left: 4px solid; }
  .cro-label-col.partex { background: #eff6ff; border-left-color: #93c5fd; }
  .cro-label-col.eurofins { background: #ecfdf5; border-left-color: #6ee7b7; }
  .cro-label-col.nomic { background: #f5f3ff; border-left-color: #c4b5fd; }
  .cro-label-text { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(-90deg); white-space: nowrap; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
  .cro-label-text.partex { color: #2563eb; }
  .cro-label-text.eurofins { color: #059669; }
  .cro-label-text.nomic { color: #7c3aed; }

  /* Assay rows */
  .assay-rows { flex: 1; }
  .assay-row { display: flex; align-items: center; height: 80px; }
  .assay-row.has-reruns { height: 96px; }
  .assay-row + .assay-row { border-top: 1px solid #f3f4f6; }
  .assay-name { flex-shrink: 0; width: 160px; text-align: right; padding-right: 12px; font-size: 14px; font-weight: 500; color: #374151; }

  /* Timeline */
  .timeline { position: relative; flex: 1; height: 80px; margin-right: 60px; }
  .has-reruns .timeline { height: 96px; }
  .weekend-bar { position: absolute; top: 0; bottom: 0; background: repeating-linear-gradient(90deg, #e5e7eb 0px, #e5e7eb 4px, #f9fafb 4px, #f9fafb 8px); }
  .today-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #f87171; }
  .gantt-bar { position: absolute; top: 50%; height: 12px; transform: translateY(-50%); border-radius: 9999px; opacity: 0.3; }
  .gantt-bar.partex { background: #60a5fa; }
  .gantt-bar.eurofins { background: #34d399; }
  .gantt-bar.nomic { background: #a78bfa; }
  .milestone-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; }
  .dot-arrival { background: #4b5563; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-data-partex { background: #1d4ed8; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-data-eurofins { background: #047857; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-data-nomic { background: #6d28d9; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-regular-partex { background: #60a5fa; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-regular-eurofins { background: #34d399; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-regular-nomic { background: #a78bfa; border: 2px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-rerun { background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .dot-rerun.partex { border: 2px solid #1d4ed8; }
  .dot-rerun.eurofins { border: 2px solid #047857; }
  .dot-rerun.nomic { border: 2px solid #6d28d9; }
  .dot-recomm { background: #fb923c; border: 2px solid #fb923c; box-shadow: 0 1px 2px rgba(0,0,0,.15); }

  /* Milestone labels */
  .ms-label { position: absolute; transform: translateX(-50%); white-space: nowrap; font-size: 11px; font-weight: 600; color: #4b5563; pointer-events: none; }
  .ms-label .ms-date { font-weight: 400; color: #9ca3af; }

  /* Today label */
  .today-label-row { display: flex; }
  .today-label-area { position: relative; flex: 1; height: 20px; }
  .today-text { position: absolute; transform: translateX(-50%); font-size: 14px; font-weight: 700; color: #ef4444; }

  /* Password overlay */
  .pw-overlay { position: fixed; inset: 0; background: #f9fafb; z-index: 9999; display: flex; align-items: center; justify-content: center; }
  .pw-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 40px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .pw-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .pw-box p { font-size: 13px; color: #6a6a6a; margin-bottom: 20px; }
  .pw-box input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #d1d5db; border-radius: 6px; outline: none; }
  .pw-box input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .pw-box button { width: 100%; margin-top: 12px; padding: 10px; font-size: 14px; font-weight: 500; background: #3b82f6; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  .pw-box button:hover { background: #2563eb; }
  .pw-error { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }

  @media print { body { background: #fff; } .pw-overlay { display: none !important; } }
</style>
</head>
<body>

<!-- Password overlay -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h2>CRO Study Tracker</h2>
    <p>Enter password to view tracker</p>
    <input type="password" id="pwInput" placeholder="Password" autocomplete="off" autofocus>
    <button onclick="checkPw()">Unlock</button>
    <div class="pw-error" id="pwError">Incorrect password</div>
  </div>
</div>

<script>
const PW_HASH='141fe80e0959e72574436d6ae4705fe44a0b7ed5076ae2d16e9923a968b07730';
async function sha256(s){const d=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(await sha256(v)===PW_HASH){
    document.getElementById('pwOverlay').style.display='none';
    sessionStorage.setItem('cro_study_auth','1');
  } else {
    document.getElementById('pwError').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw()});
if(sessionStorage.getItem('cro_study_auth')==='1') document.getElementById('pwOverlay').style.display='none';
</script>

<div class="container" id="app"></div>

<script>
// ── Hardcoded sheet data ──
const SHEET_DATA = {
  "summary": [
    ["axi_study_id","customer","n_compounds","date_cmpds","date_tv","date_phh","date_nomic","date_adme","date_adme_reruns","date_mt","total_days","working_days"],
    ["iso_study_001","Isomorphic","50","March 9, 2026","March 21, 2026","March 24, 2026","March 27, 2026","March 16, 2026","March 20, 2026","March 13, 2026","18","15"]
  ],
  "partex": [
    ["axi_study_id","customer","n_compounds","cro","assay","compounds_run","compound_arrival","date_cell_seed","date_cmpds_added","date_prod_end","date_images","date_data_transfer","date_supes_ship"],
    ["iso_study_001","Isomorphic","50","Partex","Truvivo","1-50","March 9, 2026","March 12, 2026","March 17, 2026","March 19, 2026","March 20, 2026","March 21, 2026","March 20, 2026"],
    ["iso_study_001","Isomorphic","50","Partex","2D PHH","1-50","March 9, 2026","March 16, 2026","March 17, 2026","March 23, 2026","March 23, 2026","March 24, 2026","NA"]
  ],
  "nomic": [
    ["axi_study_id","customer","n_compounds","cro","panel","compounds_run","date_supes_ship","date_supes_arrive","date_exp_start","date_readout","date_data_sent"],
    ["iso_study_001","Isomorphic","50","Partex","77-plex","1-50","March 20, 2026","March 23, 2026","March 24, 2026","March 26, 2026","March 27, 2026"]
  ],
  "eurofins": [
    ["axi_study_id","customer","n_compounds","cro","assay","compounds_run","compound_arrival","compounds_aliquoted","date_prep","date_cmpds_added","date_inject","date_readout","date_data_transfer","date_reruns_commed","date_rerun_prep","date_rerun_inject","date_rerun_data_transfer","date_adme_reurns"],
    ["iso_study_001","Isomorphic","50","Eurofins","LogD","1-50","March 5, 2026","March 9, 2026","March 10, 2026","","March 11, 2026","","March 12, 2026","March 13, 2026","March 16, 2026","March 17, 2026","March 18, 2026","March 20, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","Aq Sol","1-50","March 5, 2026","March 9, 2026","March 10, 2026","","March 11, 2026","","March 12, 2026","March 13, 2026","March 16, 2026","March 17, 2026","March 18, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","PPB","1-50","March 5, 2026","March 10, 2026","March 11, 2026","","March 12, 2026","","March 13, 2026","March 16, 2026","March 17, 2026","March 18, 2026","March 19, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","Clint","1-50","March 5, 2026","March 10, 2026","March 11, 2026","","March 12, 2026","","March 13, 2026","March 16, 2026","March 17, 2026","March 18, 2026","March 19, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","Caco2","1-50","March 5, 2026","March 10, 2026","March 12, 2026","March 12, 2026","March 13, 2026","","March 16, 2026","March 17, 2026","March 18, 2026","March 19, 2026","March 20, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","BSEP","1-50","March 5, 2026","March 10, 2026","March 11, 2026","","March 12, 2026","","March 13, 2026","March 16, 2026","March 17, 2026","March 18, 2026","March 19, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","Mito Tox","1-50","March 5, 2026","March 10, 2026","March 11, 2026","March 12, 2026","","March 13, 2026","March 13, 2026"],
    ["iso_study_001","Isomorphic","50","Eurofins","RM","1-50","March 5, 2026","March 10, 2026","March 11, 2026","","March 13, 2026","March 14, 2026","March 16, 2026"]
  ]
};

// ── Parsing ──
function parseDate(s) {
  if (!s || s.trim() === '' || s.trim().toUpperCase() === 'NA') return null;
  const d = new Date(s.trim());
  return isNaN(d.getTime()) ? null : d;
}

function rowsToMap(raw) {
  if (raw.length < 2) return [];
  const [header, ...data] = raw;
  return data.map(row => Object.fromEntries(header.map((key, i) => [key, row[i] ?? ''])));
}

function parsePartexRows(raw) {
  return rowsToMap(raw).map(r => {
    const milestones = [
      { label: 'Arrival', date: parseDate(r.compound_arrival), type: 'arrival' },
      { label: 'Cell seed', date: parseDate(r.date_cell_seed), type: 'experiment-start' },
      { label: 'Cmpds added', date: parseDate(r.date_cmpds_added), type: 'event' },
      { label: 'Prod. end', date: parseDate(r.date_prod_end), type: 'experiment-end' },
      { label: 'Images', date: parseDate(r.date_images), type: 'event' },
      { label: 'Data', date: parseDate(r.date_data_transfer), type: 'data' }
    ].filter(m => m.date !== null);
    return { study_id: r.axi_study_id, customer: r.customer, cro: 'Partex', assay: r.assay, milestones, rerun_milestones: null };
  });
}

function parseNomicRows(raw) {
  return rowsToMap(raw).map(r => {
    const milestones = [
      { label: 'Ship', date: parseDate(r.date_supes_ship), type: 'arrival' },
      { label: 'Arrive', date: parseDate(r.date_supes_arrive), type: 'event' },
      { label: 'Exp. start', date: parseDate(r.date_exp_start), type: 'experiment-start' },
      { label: 'Readout', date: parseDate(r.date_readout), type: 'experiment-end' },
      { label: 'Data', date: parseDate(r.date_data_sent), type: 'data' }
    ].filter(m => m.date !== null);
    return { study_id: r.axi_study_id, customer: r.customer, cro: 'Nomic', assay: r.panel, milestones, rerun_milestones: null };
  });
}

function parseEurofinsRows(raw) {
  return rowsToMap(raw).map(r => {
    const milestones = [
      { label: 'Arrival', date: parseDate(r.compound_arrival), type: 'arrival' },
      { label: 'Prep', date: parseDate(r.date_prep), type: 'experiment-start' },
      { label: 'Inject', date: parseDate(r.date_inject), type: 'event' },
      { label: 'Readout', date: parseDate(r.date_readout), type: 'event' },
      { label: 'Data', date: parseDate(r.date_data_transfer), type: 'data' }
    ].filter(m => m.date !== null);

    const rerunPrep = parseDate(r.date_rerun_prep);
    const rerunInject = parseDate(r.date_rerun_inject);
    const rerunData = parseDate(r.date_rerun_data_transfer);
    const rerunComm = parseDate(r.date_reruns_commed);
    const rerun_milestones = [rerunPrep, rerunInject, rerunData, rerunComm].some(Boolean)
      ? [
          { label: 'Re-prep', date: rerunPrep, type: 'experiment-start' },
          { label: 'Re-inject', date: rerunInject, type: 'event' },
          { label: 'Re-data', date: rerunData, type: 'data' },
          { label: 'Re-comm.', date: rerunComm, type: 'rerun-communication' }
        ].filter(m => m.date !== null)
      : null;

    return { study_id: r.axi_study_id, customer: r.customer, cro: 'Eurofins', assay: r.assay, milestones, rerun_milestones };
  });
}

function groupIntoStudies(rows, summaryRaw) {
  const summaryRows = rowsToMap(summaryRaw);
  const byStudy = new Map();
  for (const row of rows) {
    if (!byStudy.has(row.study_id)) byStudy.set(row.study_id, []);
    byStudy.get(row.study_id).push(row);
  }
  return [...byStudy.entries()].map(([study_id, studyRows]) => {
    const summary = summaryRows.find(s => s.axi_study_id === study_id);
    return {
      study_id,
      customer: studyRows[0].customer,
      n_compounds: parseInt(summary?.n_compounds ?? '0', 10),
      total_days: parseInt(summary?.total_days ?? '0', 10),
      working_days: parseInt(summary?.working_days ?? '0', 10),
      rows: studyRows
    };
  });
}

// ── Chart helpers ──
const DAY_MS = 86400000;
const ROW_HEIGHT = 80;
const CRO_LABEL_WIDTH = 40;
const ASSAY_LABEL_WIDTH = 160;
const CRO_ORDER = ['Partex', 'Eurofins', 'Nomic'];
const MILESTONE_ORDER = { arrival: 0, 'experiment-start': 1, event: 2, 'experiment-end': 3, data: 4, 'rerun-communication': 5 };

function studyDateRange(rows) {
  const allDates = rows.flatMap(r => [...r.milestones, ...(r.rerun_milestones ?? [])]).map(m => m.date.getTime());
  if (allDates.length === 0) return null;
  return { start: new Date(Math.min(...allDates)), end: new Date(Math.max(...allDates)) };
}

function toPercent(date, start, totalMs) {
  return ((date.getTime() - start.getTime()) / totalMs) * 100;
}

function isWeekend(date) { const d = date.getDay(); return d === 0 || d === 6; }

function eachDay(start, end) {
  const days = [];
  const cur = new Date(start); cur.setHours(0,0,0,0);
  const endTime = new Date(end); endTime.setHours(0,0,0,0);
  while (cur.getTime() <= endTime.getTime()) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
  return days;
}

function formatAxisLabel(date) {
  return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatShortDate(date) {
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function assignLabelLevels(milestones, totalMs, rangeStart) {
  if (milestones.length === 0) return [];
  const pcts = milestones.map(m => toPercent(m.date, rangeStart, totalMs));
  const levels = new Array(milestones.length).fill(0);
  const THRESHOLD = 10;
  for (let i = 1; i < pcts.length; i++) {
    for (let level = 0; level < 4; level++) {
      let collision = false;
      for (let j = Math.max(0, i - 3); j < i; j++) {
        if (levels[j] === level && Math.abs(pcts[i] - pcts[j]) < THRESHOLD) { collision = true; break; }
      }
      if (!collision) { levels[i] = level; break; }
    }
  }
  return levels;
}

// ── Rendering ──
let activeFilters = new Set(CRO_ORDER);

function render() {
  const allRows = [...parsePartexRows(SHEET_DATA.partex), ...parseNomicRows(SHEET_DATA.nomic), ...parseEurofinsRows(SHEET_DATA.eurofins)];
  const studies = groupIntoStudies(allRows, SHEET_DATA.summary);
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.className = 'header';
  header.innerHTML = '<h1>CRO Study Tracker</h1><span class="sync-info">Data as of: March 11, 2026</span>';
  app.appendChild(header);

  // Filters
  const filtersDiv = document.createElement('div');
  filtersDiv.className = 'filters';
  filtersDiv.innerHTML = '<span class="label">Show:</span>';
  CRO_ORDER.forEach(cro => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilters.has(cro) ? ' active' : '');
    btn.innerHTML = `<span class="filter-dot dot-${cro.toLowerCase()}"></span>${cro}`;
    btn.onclick = () => { if (activeFilters.has(cro)) activeFilters.delete(cro); else activeFilters.add(cro); render(); };
    filtersDiv.appendChild(btn);
  });
  app.appendChild(filtersDiv);

  // Studies
  studies.forEach(study => {
    const range = studyDateRange(study.rows);
    if (!range) return;
    const totalMs = range.end.getTime() - range.start.getTime() || DAY_MS;
    const today = new Date();
    const todayPct = toPercent(today, range.start, totalMs);
    const days = eachDay(range.start, range.end);
    const visibleRows = study.rows.filter(r => activeFilters.has(r.cro));
    if (visibleRows.length === 0) return;

    const card = document.createElement('div');
    card.className = 'study-card';

    // Study header
    const sh = document.createElement('div');
    sh.className = 'study-header';
    sh.innerHTML = `
      <div class="study-header-top">
        <div>
          <div class="study-title">${study.customer}</div>
          <div class="study-sub">${study.study_id} &middot; ${study.n_compounds} compounds</div>
        </div>
        <div class="study-stats">
          <div class="stat"><div class="stat-val">${study.total_days}</div><div class="stat-label">calendar days</div></div>
          <div class="stat"><div class="stat-val">${study.working_days}</div><div class="stat-label">working days</div></div>
        </div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-weekend"></span> Weekend</span>
        <span class="legend-item"><span class="legend-dot"></span> Milestone</span>
        <span class="legend-item"><span class="legend-rerun"></span> Rerun</span>
        <span class="legend-item"><span class="legend-recomm"></span> Re-comm.</span>
        <span class="legend-item"><span class="legend-today"></span> Today</span>
      </div>`;
    card.appendChild(sh);

    // Chart area
    const chartArea = document.createElement('div');
    chartArea.className = 'chart-area';

    // Date axis
    const axisWrap = document.createElement('div');
    axisWrap.style.paddingLeft = (CRO_LABEL_WIDTH + ASSAY_LABEL_WIDTH) + 'px';
    const axis = document.createElement('div');
    axis.className = 'date-axis';
    const chartW = 900; // approximate
    const labelInterval = Math.max(1, Math.ceil(days.length / Math.floor(chartW / 80)));
    days.forEach((day, i) => {
      if (i % labelInterval === 0) {
        const pct = toPercent(day, range.start, totalMs);
        const lbl = document.createElement('span');
        lbl.className = 'date-label';
        lbl.style.left = pct + '%';
        lbl.textContent = formatAxisLabel(day);
        axis.appendChild(lbl);
      }
    });
    axisWrap.appendChild(axis);
    chartArea.appendChild(axisWrap);

    // CRO groups
    CRO_ORDER.forEach(cro => {
      const croRows = visibleRows.filter(r => r.cro === cro);
      if (croRows.length === 0) return;

      const group = document.createElement('div');
      group.className = 'cro-group';

      // CRO label column
      const croLabel = document.createElement('div');
      croLabel.className = 'cro-label-col ' + cro.toLowerCase();
      const croText = document.createElement('div');
      croText.className = 'cro-label-text ' + cro.toLowerCase();
      croText.textContent = cro;
      croLabel.appendChild(croText);
      group.appendChild(croLabel);

      // Assay rows
      const rowsDiv = document.createElement('div');
      rowsDiv.className = 'assay-rows';

      croRows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'assay-row' + (row.rerun_milestones && row.rerun_milestones.length > 0 ? ' has-reruns' : '');

        // Assay name
        const nameEl = document.createElement('div');
        nameEl.className = 'assay-name';
        nameEl.textContent = row.assay;
        rowEl.appendChild(nameEl);

        // Timeline
        const tl = document.createElement('div');
        tl.className = 'timeline';

        // All milestones merged + sorted for label staggering
        const allMs = [...row.milestones, ...(row.rerun_milestones ?? [])].sort((a, b) => a.date.getTime() - b.date.getTime());
        const levels = assignLabelLevels(allMs, totalMs, range.start);
        const levelMap = new Map(allMs.map((m, i) => [m, levels[i]]));

        // Weekend bars
        days.forEach(day => {
          if (isWeekend(day)) {
            const pct = toPercent(day, range.start, totalMs);
            const widthPct = (DAY_MS / totalMs) * 100;
            const wb = document.createElement('div');
            wb.className = 'weekend-bar';
            wb.style.left = pct + '%';
            wb.style.width = `calc(${widthPct}% - 6px)`;
            tl.appendChild(wb);
          }
        });

        // Today line
        if (todayPct >= 0 && todayPct <= 100) {
          const tline = document.createElement('div');
          tline.className = 'today-line';
          tline.style.left = todayPct + '%';
          tl.appendChild(tline);
        }

        // Main bar
        const sorted = [...row.milestones].sort((a, b) => MILESTONE_ORDER[a.type] - MILESTONE_ORDER[b.type]);
        const barStart = sorted.find(m => m.type === 'experiment-start' || m.type === 'arrival');
        const barEnd = [...sorted].reverse().find(m => m.type === 'data');
        if (barStart && barEnd) {
          const leftPct = toPercent(barStart.date, range.start, totalMs);
          const rightPct = toPercent(barEnd.date, range.start, totalMs);
          const bar = document.createElement('div');
          bar.className = 'gantt-bar ' + row.cro.toLowerCase();
          bar.style.left = leftPct + '%';
          bar.style.width = (rightPct - leftPct) + '%';
          tl.appendChild(bar);
        }

        // Rerun bar + dots
        if (row.rerun_milestones && row.rerun_milestones.length >= 2) {
          const rs = row.rerun_milestones[0];
          const re = row.rerun_milestones[row.rerun_milestones.length - 1];
          const leftPct = toPercent(rs.date, range.start, totalMs);
          const rightPct = toPercent(re.date, range.start, totalMs);
          const rbar = document.createElement('div');
          rbar.className = 'gantt-bar ' + row.cro.toLowerCase();
          rbar.style.left = leftPct + '%';
          rbar.style.width = (rightPct - leftPct) + '%';
          rbar.style.opacity = '0.2';
          tl.appendChild(rbar);

          row.rerun_milestones.forEach(ms => {
            const pct = toPercent(ms.date, range.start, totalMs);
            const level = levelMap.get(ms) ?? 0;
            // Dot
            const dot = document.createElement('div');
            dot.className = ms.type === 'rerun-communication' ? 'milestone-dot dot-recomm' : 'milestone-dot dot-rerun ' + row.cro.toLowerCase();
            dot.style.left = pct + '%';
            tl.appendChild(dot);
            // Label
            const lbl = document.createElement('div');
            lbl.className = 'ms-label';
            lbl.style.left = pct + '%';
            lbl.style.bottom = `calc(50% + ${10 + level * 18}px)`;
            lbl.innerHTML = `${ms.label} <span class="ms-date">${formatShortDate(ms.date)}</span>`;
            tl.appendChild(lbl);
          });
        }

        // Regular milestones
        row.milestones.forEach(ms => {
          const pct = toPercent(ms.date, range.start, totalMs);
          const level = levelMap.get(ms) ?? 0;
          // Dot
          const dot = document.createElement('div');
          if (ms.type === 'data') dot.className = 'milestone-dot dot-data-' + row.cro.toLowerCase();
          else if (ms.type === 'arrival') dot.className = 'milestone-dot dot-arrival';
          else dot.className = 'milestone-dot dot-regular-' + row.cro.toLowerCase();
          dot.style.left = pct + '%';
          tl.appendChild(dot);
          // Label
          const lbl = document.createElement('div');
          lbl.className = 'ms-label';
          lbl.style.left = pct + '%';
          lbl.style.bottom = `calc(50% + ${10 + level * 18}px)`;
          lbl.innerHTML = `${ms.label} <span class="ms-date">${formatShortDate(ms.date)}</span>`;
          tl.appendChild(lbl);
        });

        rowEl.appendChild(tl);
        rowsDiv.appendChild(rowEl);
      });

      group.appendChild(rowsDiv);
      chartArea.appendChild(group);
    });

    // Today label
    if (todayPct >= 0 && todayPct <= 100) {
      const todayRow = document.createElement('div');
      todayRow.className = 'today-label-row';
      todayRow.style.paddingLeft = (CRO_LABEL_WIDTH + ASSAY_LABEL_WIDTH) + 'px';
      const todayArea = document.createElement('div');
      todayArea.className = 'today-label-area';
      const todayText = document.createElement('span');
      todayText.className = 'today-text';
      todayText.style.left = todayPct + '%';
      todayText.textContent = 'TODAY';
      todayArea.appendChild(todayText);
      todayRow.appendChild(todayArea);
      chartArea.appendChild(todayRow);
    }

    card.appendChild(chartArea);
    app.appendChild(card);
  });
}

render();
</script>
</body>
</html>
